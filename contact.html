<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Puneeth Grand Hotel | Contact</title>

    <meta name="description" content="Contact Puneeth Grand Hotel for room bookings and enquiries.">

    <meta name="keywords" content="hotel contact, hotel enquiry, hotel booking">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">
            <h2>Puneeth Grand Hotel</h2>
        </div>

        <nav>

            <ul>

                <li><a href="index.html">Home</a></li>

                <li><a href="about.html">About</a></li>

                <li><a href="rooms.html">Rooms</a></li>

                <li><a href="gallery.html">Gallery</a></li>

                <li><a href="booking.html">Booking</a></li>

                <li><a href="contact.html" class="active">Contact</a></li>

            </ul>

        </nav>

    </header>

    <!-- Contact Section -->

    <section>

        <h1 style="text-align:center;color:#003366;">Contact Us</h1>

        <br>

        <div style="text-align:center; margin-bottom:30px;">

            <p><strong>Address:</strong> Puneeth Grand Hotel, Beach Road, Visakhapatnam, Andhra Pradesh</p>

            <p><strong>Phone:</strong> +91 9398417317</p>

            <p><strong>Email:</strong> info@Puneeth Grand Hotel.com</p>

        </div>

        <!-- Contact Form -->

        <form onsubmit="return validateContact()">

            <label>Full Name</label>

            <input
                type="text"
                id="contactName"
                placeholder="Enter your name"
            >

            <label>Email Address</label>

            <input
                type="email"
                id="contactEmail"
                placeholder="Enter your email"
            >

            <label>Your Message</label>

            <textarea
                id="message"
                rows="6"
                placeholder="Write your message here..."
            ></textarea>

            <button type="submit">Send Message</button>

        </form>

    </section>

    <!-- Footer -->

    <footer>

        <p>&copy; 2026 Puneeth Grand Hotel. All Rights Reserved.</p>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
